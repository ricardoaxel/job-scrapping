<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vacantes para Valeria</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div id="auth-overlay" class="auth-overlay">
    <div class="auth-dialog">
      <p>🔒 Área personal</p>
      <input type="password" id="auth-input" placeholder="Contraseña">
      <button id="auth-btn">Entrar</button>
      <div id="auth-error"></div>
    </div>
  </div>

  <header>
    <h1>Vacantes para mi Vale bb &lt;3</h1>
    <p class="subtitle">Ofertas de marketing filtradas para tu perfil &middot; Te amoc osita, tú puedes &lt;3 jeje ;^)</p>
    <div class="header-actions">
      <button id="ref-cv-btn" class="ref-cv-btn">📄 Ver CV base de referencia</button>
      <button id="notes-btn" class="ref-cv-btn">📝 Notas</button>
      <button id="stats-btn" class="ref-cv-btn">📊 Stats</button>
    </div>
    <div id="notes-panel" class="notes-panel hidden">
      <div class="notes-list" id="notes-list"></div>
      <div class="notes-add">
        <textarea id="notes-input" placeholder="Nueva nota..." rows="2"></textarea>
        <button id="notes-add-btn" class="btn btn-primary">Agregar</button>
      </div>
    </div>
  </header>

  <main>
    <div class="filters-card">
      <div class="filter-group">
        <span class="filter-label">Buscar</span>
        <input type="text" id="search" placeholder="Título, empresa, categoría..." autocomplete="off">
      </div>
      <div class="filter-group">
        <span class="filter-label">Categoría</span>
        <div id="category-filters" class="pills-row"></div>
      </div>
      <div class="filter-group">
        <span class="filter-label">Publicación</span>
        <div id="time-filters"></div>
      </div>
      <div class="filter-group">
        <span class="filter-label">Seguimiento</span>
        <div id="tracking-filters" class="pills-row"></div>
      </div>
      <button id="reset-filters-btn" class="reset-filters-btn">↺ Resetear filtros</button>
    </div>

    <div id="stats" class="stats"></div>

    <div id="job-list" class="job-list"></div>

    <div id="pagination" class="pagination"></div>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modal-close">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="stats-view" class="stats-view hidden">
    <div id="stats-content"></div>
  </div>

  <footer>
    <p>Proyecto personal &middot; <a href="https://linkedin.com/in/valeria-paez-reyes" target="_blank">Valeria Páez</a></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
