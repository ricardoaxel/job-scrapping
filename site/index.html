<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vacantes para Valeria</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Vacantes para mi Vale bb &lt;3</h1>
    <p class="subtitle">Ofertas de marketing filtradas para tu perfil &middot; Te amoc osita, tú puedes &lt;3 jeje ;^)</p>
    <button id="ref-cv-btn" class="ref-cv-btn">📄 Ver CV base de referencia</button>
  </header>

  <main>
    <div class="filters-card">
      <div class="filter-group">
        <span class="filter-label">Buscar</span>
        <input type="text" id="search" placeholder="Título, empresa, categoría..." autocomplete="off">
      </div>
      <div class="filter-group">
        <span class="filter-label">Categoría</span>
        <div id="category-filters" class="pills-row"></div>
      </div>
      <div class="filter-group">
        <span class="filter-label">Publicación</span>
        <div id="time-filters"></div>
      </div>
    </div>

    <div id="stats" class="stats"></div>

    <div id="job-list" class="job-list"></div>

    <div id="pagination" class="pagination"></div>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modal-close">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <footer>
    <p>Proyecto personal &middot; <a href="https://linkedin.com/in/valeria-paez-reyes" target="_blank">Valeria Páez</a></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
