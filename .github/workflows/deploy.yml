name: Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare site
        run: |
          VERSION="v$(git rev-list --count HEAD)"
          mkdir -p _site/data _site/cvs
          cp filtered_jobs.json _site/data/
          cp cvs/skill_per_category.json _site/data/
          cp cvs/base-cv.md cvs/base-cv-es.md _site/data/
          cp -r cvs/Generated/* _site/cvs/
          sed "s/id=\"version\">dev</id=\"version\">$VERSION</" site/index.html > _site/index.html
          cp site/*.css site/*.js _site/
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
